<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الصفحة غير موجودة</title>
<link rel="stylesheet" href="../css/style.css">


<style>

body{
font-family:sans-serif;
text-align:center;
user-select: none;
}

h1{
font-size:10rem;
color: #404e4ff1;
}

p{
font-size:18px;
}
.banner{
    margin: auto;
    max-width: 800px;
    margin-top: 0.5rem;
    opacity: 0.9;
    
}
.banner img{
    width: 100%;
    filter: grayscale(1);
}

</style>

</head>

<body>
    <div class="banner">
<img src="/img/banner.webp" alt="بانر الموقع">
</div>
<h1>404</h1>

<p>الصفحة غير موجودة.🙁</p>
<p>سيتم تحويلك إلى الموقع خلال 3 ثوانٍ.</p>
<script>
// 👇 خريطة التحويل للروابط القديمة
const redirects = {
  "quran.html": "/quran/",
  "ramadan.html": "/ramadan/",
  "ramadan": "/prayer",
  "surah.html": "/quran-read/#/surah/1",
  "tasbeeh.html": "/tasbeeh/",
  "about.html": "/about/",
  "azkar.html": "/azkar/",
  "ruqyah.html": "/ruqyah/",
  "radio.html": "/radio/",
  "quran-read.html": "/quran-read/",
  "tasbeeh": "/prayer",
  "/azkar": "/prayer",
};

// جلب اسم الصفحة من المسار أو query
let page = window.location.pathname.split("/").pop().toLowerCase().replace(/\/$/, "");

if (!page && window.location.search) {
  page = window.location.search.replace("?", "").toLowerCase();
}

// 👇 تحويل ذكي للروابط القديمة
if (redirects[page]) {
  window.location.replace(redirects[page]);
} 
// 👇 تحويل ذكي للروابط اللي فيها سور مباشرة
else if (page.startsWith("surah/")) {
  const surahNumber = page.split("/")[1];
  if (surahNumber) {
    window.location.replace(`/quran-read/#/surah/${surahNumber}`);
  } else {
    setTimeout(() => window.location.replace("/"), 3000);
  }
} 
// 👇 أي رابط غير معروف → 3 ثواني ثم العودة للرئيسية
else {
  setTimeout(() => {
    window.location.replace("/");
  }, 3000);
}
</script>
</body>
</html>
