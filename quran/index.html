  <script>
    (function () {
      var t = localStorage.getItem("quran-sadaka-theme");
      document.documentElement.setAttribute(
        "data-theme",
        t === "dark" ? "dark" : "light"
      );
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>
  <body>
   
  <header class="page-header">
      <button
      type="button"
      id="themeToggle"
      class="theme-toggle"
      aria-label="الوضع الداكن"
    >
      🌙
    </button>
    <button class="shareBtn" onclick="shareSite()"><img class="share-icon" src="../img/share.svg" alt="share icon"></button>
      <a href="../" class="back-link home">🏠</a>
      <img loading="lazy" class="address" src="../img/q.svg"  class="lazyload"
  alt="شعار القرآن الكريم" />
      <div>
        <button class="menu-icon" id="menu-icon">
          ☰
        </button>
        <nav class="close-nav" id="close-nav"><span class="close-icon">❌</span>
         <a href="../quran">🔊 استمع للقرآن</a>
    <a href="../quran-read">📜 إقرأ القرآن</a>
    <a href="../prayer/">🕌 أقم صلاتك</a>
    <a href="../ruqyah">🛡️ الرقية الشرعية</a>
    <a href="../radio">📻 الراديو</a>
    <a href="../about">ℹ️ عن الموقع</a>
        </nav>
      </div>
    </header>
  
    <!-- ===== Mobile Navbar ===== -->

    <main>
      <div class="quran-layout">
        
        <div class="quran-controls">
          <div class="banner">
          <img loading="lazy" data-src="../img/banner.webp"  class="lazyload"
  alt=" شعار القرآن الكريم" />
          </div>
          
          <label for="reciter">اختر القارئ:</label>
          <select id="reciter">
            <option value="">-- جاري التحميل --</option>
          </select>
          <label for="moshaf">نوع القراءة:</label>
          <select id="moshaf">
            <option value="0">-- اختر القارئ أولاً --</option>
          </select>
          
        </div>
       <div class="player-bar" id="playerBar" style = "display: none;">
  <div class="player-header">
    <img src="../img/icon.webp" alt="App Icon" class="player-icon">
    <div class="surah-name" id="playerSurahName"></div>
  </div>

 <div class="player-controls">
 
  <button id="btnPrev" class="ctrl-btn">⏭</button>
  <button id="btnPlayPause" class="ctrl-btn ctrl-play">▶</button>
  <button id="btnStop" class="ctrl-btn">⏹</button>
  <button id="btnNext" class="ctrl-btn">⏮</button>
  <button id="btnAutoReplay" class="ctrl-btn">🔁</button>
 
</div>


  <div class="progress-wrapper">
      <div class="volume-control">
    <span id="volumeIcon">🔊</span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" orient="vertical">
  </div>
    <span id="readCurrentTime">0:00</span>
    <div class="progress-bar" id="readProgressBar">
      <div class="progress-fill" id="readProgressFill"></div>
      <div class="progress-knob" id="readProgressKnob"></div>
    </div>
    <span id="readDuration">0:00</span>
  </div>

  <audio id="mainAudio" preload="metadata"></audio>
</div>
        <div class="loading" id="loading">جاري تحميل السور...</div>
        <div class="error-msg" id="errorMsg" style="display: none"></div>
        <div class="surah-list" id="surahList"></div>
      </div>
    </main>
    
     
    </button>

    <script>
      function shareSite() {
        if (navigator.share) {
          navigator
            .share({
              title: "القرآن الكريم | صدقة جارية",
              text: "شارك في صدقة جارية من خلال الاستماع للقرآن الكريم وقراءة الرقية الشرعية.",
              url: window.location.href,
            })
            .then(() => console.log("تمت المشاركة بنجاح"))
            .catch((error) => console.log("خطأ في المشاركة:", error));
        } else {
          alert(
            "هذا التصفح لا يدعم ميزة المشاركة. الرجاء نسخ الرابط ومشاركته يدوياً.",
          );
        }
      }
    </script>

    <script src="../js/lazysizes.js"></script>
<script src="../js/theme.js"></script>
    <script src="../js/quran.js"></script>
   <script src="../js/notifications.js"></script>
</body>
